openapi: "3.0.3"

info:
  title: CitaSalud — Propiedades API
  version: "1.0.0"
  description: |
    API para consulta y gestión del estado de propiedades inmobiliarias.
    Expone endpoints para el portal de clientes (lectura) y el panel de asesores (escritura),
    así como un stream de eventos en tiempo real vía Server-Sent Events (SSE).

servers:
  - url: http://localhost:8080
    description: Entorno local de desarrollo

tags:
  - name: propiedades
    description: Operaciones sobre propiedades inmobiliarias
  - name: estado
    description: Gestión y notificación del estado de una propiedad

paths:

  /api/v1/propiedades:
    get:
      operationId: listarPropiedades
      summary: Listar todas las propiedades con su estado actual
      description: |
        Retorna el listado de todas las propiedades del sistema.
        Acceso público — no requiere autenticación. Cubre FR-007.
      tags:
        - propiedades
      responses:
        "200":
          description: Lista de propiedades con estado actual
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PropiedadResumenResponse"

  /api/v1/propiedades/{id}:
    get:
      operationId: obtenerPropiedad
      summary: Obtener detalles de una propiedad
      tags:
        - propiedades
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Propiedad encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropiedadResponse"
        "404":
          description: Propiedad no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/propiedades/{id}/estado:
    put:
      operationId: cambiarEstadoPropiedad
      summary: Cambiar el estado de una propiedad
      tags:
        - estado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CambiarEstadoRequest"
      responses:
        "200":
          description: Estado actualizado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropiedadResponse"
        "400":
          description: Transición de estado inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Propiedad no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/propiedades/{id}/estado/stream:
    get:
      operationId: streamEstadoPropiedad
      summary: Stream de cambios de estado en tiempo real (SSE)
      tags:
        - estado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Stream SSE activo
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/EstadoUpdateEvent"
        "404":
          description: Propiedad no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:

    EstadoPropiedad:
      type: string
      enum:
        - DISPONIBLE
        - RESERVADA
        - VENDIDA
      description: |
        Estado comercial de la propiedad.
        VENDIDA es estado terminal — no permite más transiciones.

    AccionesPermitidas:
      type: object
      required:
        - puedeAgendarVisita
        - puedeContactar
      properties:
        puedeAgendarVisita:
          type: boolean
          description: true solo si estado es DISPONIBLE
          example: true
        puedeContactar:
          type: boolean
          description: true solo si estado no es VENDIDA
          example: true

    PropiedadResponse:
      type: object
      required:
        - id
        - nombre
        - descripcion
        - precio
        - estado
        - ultimaActualizacion
      properties:
        id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        nombre:
          type: string
          maxLength: 150
          example: "Apartamento Sector Norte — Piso 4"
        descripcion:
          type: string
          maxLength: 2000
          example: "Apartamento de 3 habitaciones con vista panorámica, cocina integral..."
        precio:
          type: number
          format: double
          example: 285000000
        estado:
          $ref: "#/components/schemas/EstadoPropiedad"
        ultimaActualizacion:
          type: string
          format: date-time
          example: "2026-06-27T14:30:00Z"
        accionesPermitidas:
          $ref: "#/components/schemas/AccionesPermitidas"

    CambiarEstadoRequest:
      type: object
      required:
        - estado
      properties:
        estado:
          $ref: "#/components/schemas/EstadoPropiedad"

    EstadoUpdateEvent:
      type: object
      required:
        - propiedadId
        - estado
        - timestamp
      properties:
        propiedadId:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        estado:
          $ref: "#/components/schemas/EstadoPropiedad"
        timestamp:
          type: string
          format: date-time
          example: "2026-06-27T14:30:00Z"

    PropiedadResumenResponse:
      type: object
      required:
        - id
        - nombre
        - precio
        - estado
        - accionesPermitidas
      properties:
        id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        nombre:
          type: string
          maxLength: 150
          example: "Apartamento Sector Norte — Piso 4"
        precio:
          type: number
          format: double
          example: 285000000
        estado:
          $ref: "#/components/schemas/EstadoPropiedad"
        accionesPermitidas:
          $ref: "#/components/schemas/AccionesPermitidas"

    ErrorResponse:
      type: object
      required:
        - codigo
        - mensaje
        - timestamp
      properties:
        codigo:
          type: string
          example: "PROPIEDAD_NO_ENCONTRADA"
        mensaje:
          type: string
          example: "No se encontró una propiedad con el id especificado"
        timestamp:
          type: string
          format: date-time
          example: "2026-06-27T14:30:00Z"
